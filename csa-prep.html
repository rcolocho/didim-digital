        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            const newArray = [...array];
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [newArray[currentIndex], newArray[randomIndex]] = [newArray[randomIndex], newArray[currentIndex]];
            }
            return newArray;
        }

            const [showRationale, setShowRationale] = useState(false);

            const examDeck = useMemo(() => {
                const deck = shuffle(MASTER_BANK).slice(0, 60);
                return deck.map(q => {
                    const optionsWithMapping = q.options.map((opt, i) => ({ text: opt, isCorrect: q.correctIndices.includes(i) }));
                    const shuffledOpts = shuffle(optionsWithMapping);
                    const newCorrectIndices = shuffledOpts.map((opt, i) => opt.isCorrect ? i : -1).filter(i => i !== -1);
                    return { ...q, options: shuffledOpts.map(o => o.text), correctIndices: newCorrectIndices };
                });
            }, []);

            useEffect(() => {
                let timer;
                if ((view === 'exam' || view === 'review') && time > 0) timer = setInterval(() => setTime(t => t - 1), 1000);
                return () => clearInterval(timer);
            }, [view, time]);

            const currentQ = examDeck[globalIndex];
            const selections = currentQ ? (answers[currentQ.id] || []) : [];

            const handleChoice = (idx) => {
                if (showRationale) return;
                if (currentQ.type === 'radio') {
                    setAnswers({ ...answers, [currentQ.id]: [idx] });
                } else {
                    if (selections.includes(idx)) {
                        setAnswers({ ...answers, [currentQ.id]: selections.filter(i => i !== idx) });
                    } else if (selections.length < (currentQ.needed || 1)) {
                        setAnswers({ ...answers, [currentQ.id]: [...selections, idx] });
                    }
                }
            };

            const toggleFlag = () => {
                const n = new Set(marked);
                if (n.has(currentQ.id)) n.delete(currentQ.id); 
                else n.add(currentQ.id);
                setMarked(n);
            };

            const handleNext = () => {
                if (!showRationale) {
                    if (selections.length === 0) return;
                    setShowRationale(true);
                } else {
                    setShowRationale(false);
                    if (globalIndex < 59) setGlobalIndex(i => i + 1);
                    else setView('review');
                }
            };

            const handleSkip = () => {
                setShowRationale(false);
                if (globalIndex < 59) setGlobalIndex(i => i + 1);
                else setView('review');
            };

            const handleJump = (idx) => {
                setShowRationale(false);
                setGlobalIndex(idx);
                setView('exam');
            };

            const isCorrect = (ans, correct) => {
                if (!ans || ans.length !== correct.length) return false;
                return ans.every(v => correct.includes(v));
            };

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const secs = s % 60;
                return `${m}:${secs < 10 ? '0' : ''}${secs}`;
            };

            if (view === 'intro') {
                return (
                    <div className="bg-black h-screen w-screen text-white flex flex-col items-center justify-center p-6 antialiased text-center">
                        <div className="max-w-xl w-full border border-gray-800 bg-[#0a0a0a] p-10 rounded-sm shadow-2xl">
                            <h1 className="text-xl font-black tracking-tight border-b border-gray-800 pb-2 mb-6 uppercase italic underline decoration-blue-500">ServiceNow CSA Prep</h1>
                            <p className="text-gray-400 text-sm leading-relaxed mb-8 text-[12px] uppercase tracking-widest">Fixed Zero-Filler Deck (60 Unique items). Randomized Choices. Review and Flag Features Restored.</p>
                            <button onClick={() => setView('exam')} className="w-full py-4 bg-white text-black font-black uppercase tracking-widest text-xs hover:bg-gray-200 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)]">Authenticate & Start</button>
                        </div>
                    </div>
                );
            }

            if (view === 'review') {
                return (
                    <div className="bg-black h-[100dvh] w-screen text-white flex flex-col antialiased overflow-hidden">
                        <header className="bg-black border-b border-gray-700 px-4 py-3 flex justify-between items-center shrink-0">
                            <h2 className="text-[10px] font-black uppercase tracking-widest text-gray-400 font-mono">Exam Summary Review</h2>
                        </header>
                        <main className="flex-1 overflow-y-auto bg-[#080808] p-4 sm:p-8 custom-scrollbar">
                            <div className="max-w-4xl w-full mx-auto">
                                <table className="w-full review-table border-collapse">
                                    <thead>
                                        <tr>
                                            <th className="text-center w-16">Item</th>
                                            <th className="text-left">Status</th>
                                            <th className="text-center w-24">Marked</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {examDeck.map((q, idx) => (
                                            <tr key={idx} onClick={() => handleJump(idx)}>
                                                <td className="text-center font-bold text-gray-400">{idx + 1}</td>
                                                <td>{answers[q.id] ? <span className="text-green-500 font-bold">Answered</span> : <span className="text-red-500 italic">Unanswered</span>}</td>
                                                <td className="text-center">{marked.has(q.id) && <Flag fill="orange" color="orange" className="inline" />}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </main>
                        <footer className="bg-black border-t border-gray-700 p-6 flex justify-center shrink-0">
                            <button onClick={() => setView('results')} className="px-12 py-3 bg-blue-600 text-white font-black uppercase text-[10px] tracking-widest hover:bg-blue-500 shadow-xl">Finish Practice Session</button>
                        </footer>
                    </div>
                );
            }

            if (view === 'results') {
                const incorrects = examDeck.filter(q => !isCorrect(answers[q.id], q.correctIndices));
                const percent = (((60 - incorrects.length) / 60) * 100).toFixed(0);
                return (
                    <div className="bg-black h-screen w-screen text-white flex flex-col antialiased overflow-hidden">
                        <header className="bg-black border-b border-gray-700 px-4 py-3 flex justify-between items-center">
                            <h2 className="text-[10px] font-black uppercase text-gray-400">Score Report Breakdown</h2>
                            <button onClick={() => window.location.reload()} className="text-[8px] font-black border border-white px-3 py-1.5 uppercase hover:bg-white hover:text-black transition-all">Restart</button>
                        </header>
                        <main className="flex-1 overflow-y-auto p-4 sm:p-8 bg-[#080808] custom-scrollbar">
                            <div className="max-w-4xl mx-auto pb-20">
                                <div className="bg-[#111] border border-gray-800 p-12 mb-10 rounded-sm text-center">
                                    <div className={`text-7xl font-black mb-4 ${parseInt(percent) >= 75 ? 'text-green-500' : 'text-red-500'}`}>{percent}%</div>
                                    <p className="text-xs text-gray-500 uppercase font-bold tracking-widest">{parseInt(percent) >= 75 ? 'READY FOR CERTIFICATION' : 'NEEDS ADDITIONAL STUDY'}</p>
                                </div>
                                <h3 className="text-xl font-black uppercase mb-8 border-b border-gray-800 pb-2">Review Incorrect Items ({incorrects.length})</h3>
                                {incorrects.map((q, i) => (
                                    <div key={i} className="border border-red-900 bg-red-950/10 p-6 rounded-sm mb-6 shadow-xl">
                                        <div className="text-[9px] font-black uppercase text-red-500 mb-2">{q.domain}</div>
                                        <p className="text-sm font-medium mb-4 text-white leading-relaxed">{q.question}</p>
                                        <div className="text-xs text-green-400 mb-4 bg-black/50 p-4 border border-gray-800 rounded-sm">
                                            <span className="text-white font-black uppercase underline mr-1 text-[10px]">Correct Answer:</span> {q.correctIndices.map(idx => q.options[idx]).join(", ")}
                                        </div>
                                        <p className="text-[11px] text-gray-300 italic leading-relaxed"><span className="text-white font-black not-italic uppercase underline mr-1 font-sans">Rationale:</span> {q.rationale}</p>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            return (
                <div className="bg-black h-[100dvh] w-screen text-white flex flex-col antialiased select-none overflow-hidden">
                    <header className="bg-black border-b border-gray-700 px-4 py-3 flex justify-between items-center shrink-0">
                        <div className="flex flex-col">
                            <span className="text-[10px] font-black uppercase tracking-widest text-white underline decoration-blue-500">Pearson VUE Aligned</span>
                            <span className="text-[10px] font-bold text-gray-400 font-mono italic">Item {globalIndex + 1} of 60</span>
                        </div>
                        <div className="flex items-center gap-6 font-mono text-sm tracking-widest text-gray-300">
                            <div className="flex items-center gap-2 border border-gray-700 px-3 py-1 bg-black"><Clock /> {formatTime(time)}</div>
                            <button onClick={() => setView('review')} className="text-[8px] font-black border border-white px-3 py-1.5 uppercase hover:bg-white hover:text-black">Review Screen</button>
                        </div>
                    </header>
                    
                    <main className="flex-1 flex flex-col p-4 sm:p-16 overflow-y-auto bg-[#080808] custom-scrollbar">
                        <div className="max-w-3xl w-full mx-auto flex-1">
                            <div className="flex justify-end items-start mb-8">
                                <button onClick={toggleFlag} className={`text-[8px] flex items-center gap-2 font-black px-3 py-1.5 border transition-all ${marked.has(currentQ.id) ? 'bg-orange-500 border-orange-500 text-white shadow-[0_0_15px_rgba(255,165,0,0.4)]' : 'text-gray-400 border-gray-700 hover:border-gray-400'}`}>
                                    <Flag fill={marked.has(currentQ.id) ? "orange" : "none"} color={marked.has(currentQ.id) ? "white" : "currentColor"} className="w-3 h-3" /> {marked.has(currentQ.id) ? 'MARKED' : 'FLAG ITEM'}
                                </button>
                            </div>
                            
                            <h3 className="text-[14px] sm:text-[18px] font-normal leading-relaxed mb-10 tracking-tight text-white border-b border-gray-800 pb-8">{currentQ.question}</h3>
                            
                            <div className="space-y-3 mb-10">
                                {currentQ.options.map((option, idx) => {
                                    const isSelected = selections.includes(idx);
                                    let borderStyle = "border-gray-800 hover:border-gray-600";
                                    if (showRationale) {
                                        if (currentQ.correctIndices.includes(idx)) borderStyle = "border-green-500 bg-green-500/10";
                                        else if (isSelected) borderStyle = "border-red-500 bg-red-500/10";
                                    } else if (isSelected) borderStyle = "border-blue-500 bg-blue-500/5";

                                    return (
                                        <div key={idx} onClick={() => handleChoice(idx)} className={`group flex items-center gap-4 p-4 border-2 transition-all cursor-pointer rounded-sm ${borderStyle}`}>
                                            <div className={`w-4 h-4 border-2 flex items-center justify-center ${isSelected ? 'border-white bg-blue-500' : 'border-gray-600'} ${currentQ.type === 'radio' ? 'rounded-full' : 'rounded-none'}`}>
                                                {isSelected && <div className="bg-white w-1.5 h-1.5 rounded-full" />}
                                            </div>
                                            <span className="text-[12px] sm:text-[13px] font-medium">{option}</span>
                                        </div>
                                    );
                                })}
                            </div>
                            {showRationale && (
                                <div className="p-6 bg-[#0c0c0c] border-l-4 border-blue-500 rounded-sm mb-12 shadow-xl animate-in fade-in slide-in-from-top-4 duration-300">
                                    <div className="text-[10px] font-black uppercase text-blue-500 mb-2 font-mono tracking-widest font-bold underline">Technical Rationale</div>
                                    <p className="text-xs text-gray-300 italic">{currentQ.rationale}</p>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="bg-black border-t border-gray-700 p-6 flex justify-between items-center shrink-0">
                        <button disabled={globalIndex === 0} onClick={() => { setShowRationale(false); setGlobalIndex(i => i - 1); }} className="flex items-center gap-1.5 px-6 py-3 font-black uppercase text-[9px] border border-gray-600 hover:border-white disabled:opacity-10 transition-all active:scale-95"><ChevronLeft /> Previous</button>
                        
                        <div className="hidden md:flex gap-1 max-w-[25%] overflow-x-auto p-1 custom-scrollbar items-center">
                            {examDeck.map((q, i) => (
                                <div key={i} onClick={() => handleJump(i)} 
                                    className={`cursor-pointer flex-shrink-0 w-1.5 h-1.5 rounded-none transition-all ${i === globalIndex ? 'bg-white scale-150 ring-2 ring-white/20' : marked.has(q.id) ? 'bg-orange-500 shadow-[0_0_8px_rgba(255,165,0,0.5)]' : answers[q.id] ? 'bg-gray-600' : 'bg-[#222]'}`} 
                                />
                            ))}
                        </div>

                        <div className="flex gap-2">
                            {!showRationale && (
                                <button onClick={handleSkip} className="px-8 py-3 font-black uppercase text-[9px] border border-gray-600 text-gray-400 hover:border-white transition-all shadow-inner">Skip</button>
                            )}
                            <button onClick={handleNext} className={`flex items-center gap-1.5 px-8 sm:px-12 py-3 font-black uppercase text-[9px] transition-all active:scale-95 ${showRationale ? 'bg-white text-black' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-lg'}`}>
                                {showRationale ? (globalIndex === 59 ? 'FINISH' : 'NEXT') : 'SUBMIT'} <ChevronRight />
                            </button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
